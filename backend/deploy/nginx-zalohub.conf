# zalo.camerangochoang.com
server {
    listen 443 ssl http2;
    server_name zalo.camerangochoang.com;

    ssl_certificate     /etc/ssl/certs/zalo.pem;
    ssl_certificate_key /etc/ssl/private/zalo.key;

    # Chat frontend (static build)
    location / {
        root /opt/zalohub-frontend/dist;
        try_files $uri /index.html;
    }

    # Backend API
    location /api/ {
        proxy_pass http://127.0.0.1:3399;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket
    location /ws {
        proxy_pass http://127.0.0.1:3399;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Admin SPA (served by backend)
    location /admin {
        proxy_pass http://127.0.0.1:3399/admin;
        proxy_set_header Host $host;
    }

    # Media files (MinIO)
    location /media/ {
        proxy_pass http://127.0.0.1:9000/zalohub-media/;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Security headers
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name zalo.camerangochoang.com;
    return 301 https://$host$request_uri;
}
