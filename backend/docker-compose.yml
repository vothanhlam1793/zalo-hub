version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: zalohub
      POSTGRES_USER: zalohub
      POSTGRES_PASSWORD: ${DB_PASSWORD:-zalohub}
    ports:
      - '127.0.0.1:5433:5432'
    volumes:
      - ./docker-data/pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U zalohub']
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-minioadmin}
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - ./docker-data/minio:/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://zalohub:${DB_PASSWORD:-zalohub}@postgres:5432/zalohub
      MINIO_ENDPOINT: minio
      MINIO_PORT: '9000'
      MINIO_ACCESS_KEY: ${MINIO_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_PASSWORD:-minioadmin}
      MINIO_BUCKET: zalohub-media
      JWT_SECRET: ${JWT_SECRET:-zalohub-dev-secret-change-in-production}
      GOLD2_PORT: '3399'
      NODE_ENV: production
    ports:
      - '3399:3399'
